; Pico 2 (RP2350) + CC1101 image transmitter — see ../CLAUDE.md
;
; Uses maxgerhardt's platform fork because the upstream PlatformIO
; "raspberrypi" platform does not support the Pico 2 / earlephilhower core.
;
; Milestone 1: -DUSE_TINYUSB is intentionally NOT set yet. It is only needed
; for the MSC drive (Milestone 2); leaving it out keeps the smoke test on the
; default Pico-SDK USB CDC stack with fewer moving parts.

[env:rpipico2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 1m         ; LittleFS partition (used from Milestone 2 on)
monitor_speed = 115200
; TJpg_Decoder note: its own User_Config.h already defines TJPGD_LOAD_FFS on
; RP2040, enabling the fs::File input overloads we feed with FatFS files —
; no build flag needed.
lib_deps =
    jgromes/RadioLib
    bodmer/TJpg_Decoder
